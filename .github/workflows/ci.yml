name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FFMPEG_CACHE_VERSION: n7.1-linux64-gpl-7.1
      PYTHON_VERSION: "3.11"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ca-certificates curl fonts-ipafont-gothic xz-utils

      - name: Cache FFmpeg
        id: cache-ffmpeg
        uses: actions/cache@v5
        with:
          path: |
            .cache/ci/ffmpeg
            .cache/ci/ffmpeg-static.tar.xz
          key: ffmpeg-${{ runner.os }}-${{ env.FFMPEG_CACHE_VERSION }}

      - name: Install FFmpeg 7
        run: |
          mkdir -p .cache/ci
          if [ ! -x .cache/ci/ffmpeg/bin/ffmpeg ] || [ ! -x .cache/ci/ffmpeg/bin/ffprobe ]; then
            if [ ! -f .cache/ci/ffmpeg-static.tar.xz ]; then
              curl -L --fail --retry 5 --retry-delay 5 --retry-all-errors \
                -o .cache/ci/ffmpeg-static.tar.xz \
                https://github.com/BtbN/FFmpeg-Builds/releases/latest/download/ffmpeg-n7.1-latest-linux64-gpl-7.1.tar.xz
            fi
            rm -rf .cache/ci/ffmpeg
            mkdir -p .cache/ci/ffmpeg
            tar -xJf .cache/ci/ffmpeg-static.tar.xz -C .cache/ci/ffmpeg --strip-components=1
          fi
          echo "$PWD/.cache/ci/ffmpeg/bin" >> "$GITHUB_PATH"
          export PATH="$PWD/.cache/ci/ffmpeg/bin:$PATH"
          ffmpeg -version | head -n 1
          ffprobe -version | head -n 1

      - name: Install Python dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run unit tests
        run: python -m pytest -m "not smoke"

      - name: Run render smoke tests
        env:
          ZUNDAMOTION_RUN_SMOKE: "1"
          ZUNDAMOTION_SMOKE_TIMEOUT: "600"
          DISABLE_HWENC: "1"
          HW_FILTER_MODE: cpu
          USE_RAMDISK: "0"
        run: |
          ffmpeg -version | head -n 1
          ffprobe -version | head -n 1
          python -m pytest tests/test_smoke_render_samples.py -m smoke

      - name: Upload render smoke diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: smoke-python-${{ env.PYTHON_VERSION }}-render
          if-no-files-found: warn
          retention-days: 7
          path: |
            output/test_smoke/*.mp4
            output/perf/*.json
            output/test_smoke/*.stdout.log
            output/test_smoke/*.stderr.log
            output/test_smoke/ffprobe-result.json
