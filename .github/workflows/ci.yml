name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHON_VERSION: "3.14"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ca-certificates fonts-ipafont-gothic

      - name: Validate runtime lock
        run: PYTHONPATH=scripts python scripts/check_runtime_lock.py

      - name: Install checksum-locked BtbN FFmpeg
        run: |
          sudo python scripts/install_locked_ffmpeg.py \
            --lock .devcontainer/runtime.lock.json \
            --prefix /opt/ffmpeg
          ffmpeg -version | head -n 1
          ffprobe -version | head -n 1

      - name: Install Python dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run unit tests
        run: python -m pytest -m "not smoke" --ignore=tests/test_audio_pcm_concat_integration.py

      - name: Run FFmpeg integration tests
        run: python -m pytest tests/test_audio_pcm_concat_integration.py

      - name: Build wheel and source distribution
        run: python -m build

      - name: Verify clean wheel installation
        run: |
          python -m venv /tmp/zundamotion-wheel-test
          /tmp/zundamotion-wheel-test/bin/python -m pip install --upgrade pip
          /tmp/zundamotion-wheel-test/bin/python -m pip install dist/*.whl
          /tmp/zundamotion-wheel-test/bin/zundamotion --help
          /tmp/zundamotion-wheel-test/bin/python - <<'PY'
          from importlib.resources import files

          from zundamotion.plugins.loader import builtin_plugin_paths, load_plugins_cached

          assert files("zundamotion").joinpath("templates/config.yaml").is_file()
          assert load_plugins_cached(builtin_plugin_paths())
          PY

      - name: Upload Python 3.14 distributions
        uses: actions/upload-artifact@v6
        with:
          name: packages-python-${{ env.PYTHON_VERSION }}
          if-no-files-found: error
          retention-days: 7
          path: dist/*

      - name: Run render smoke tests
        env:
          ZUNDAMOTION_RUN_SMOKE: "1"
          ZUNDAMOTION_SMOKE_TIMEOUT: "600"
          DISABLE_HWENC: "1"
          HW_FILTER_MODE: cpu
          USE_RAMDISK: "0"
        run: |
          ffmpeg -version | head -n 1
          ffprobe -version | head -n 1
          python -m pytest tests/test_smoke_render_samples.py -m smoke

      - name: Upload render smoke diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: smoke-python-${{ env.PYTHON_VERSION }}-render
          if-no-files-found: warn
          retention-days: 7
          path: |
            output/test_smoke/*.mp4
            output/perf/*.json
            output/test_smoke/*.stdout.log
            output/test_smoke/*.stderr.log
            output/test_smoke/ffprobe-result.json
