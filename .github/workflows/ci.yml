name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg fonts-ipafont-gothic

      - name: Install Python dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run unit tests
        run: python -m pytest -m "not smoke"

      - name: Run render smoke tests
        env:
          ZUNDAMOTION_RUN_SMOKE: "1"
          DISABLE_HWENC: "1"
          HW_FILTER_MODE: cpu
          USE_RAMDISK: "0"
        run: python -m pytest tests/test_smoke_render_samples.py -m smoke
