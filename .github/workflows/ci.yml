name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ca-certificates curl fonts-ipafont-gothic xz-utils

      - name: Install FFmpeg 7
        run: |
          curl -L --fail --retry 3 -o /tmp/ffmpeg-static.tar.xz \
            https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz
          sudo mkdir -p /opt/ffmpeg
          sudo tar -xJf /tmp/ffmpeg-static.tar.xz -C /opt/ffmpeg --strip-components=1
          sudo ln -sf /opt/ffmpeg/ffmpeg /usr/local/bin/ffmpeg
          sudo ln -sf /opt/ffmpeg/ffprobe /usr/local/bin/ffprobe
          ffmpeg -version | head -n 1
          ffprobe -version | head -n 1

      - name: Install Python dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run unit tests
        run: python -m pytest -m "not smoke"

      - name: Run render smoke tests
        env:
          ZUNDAMOTION_RUN_SMOKE: "1"
          ZUNDAMOTION_SMOKE_TIMEOUT: "600"
          DISABLE_HWENC: "1"
          HW_FILTER_MODE: cpu
          USE_RAMDISK: "0"
        run: |
          ffmpeg -version | head -n 1
          ffprobe -version | head -n 1
          python -m pytest tests/test_smoke_render_samples.py -m smoke
