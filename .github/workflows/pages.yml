name: Pages feature demos

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/pages.yml"
      - ".devcontainer/runtime.lock.json"
      - "pyproject.toml"
      - "site/**"
      - "!site/README.md"
      - "zundamotion/**"
      - "assets/**"
      - "scripts/check_runtime_lock.py"
      - "scripts/install_locked_ffmpeg.py"
      - "scripts/runtime_lock.py"
  workflow_dispatch:

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate runtime lock
        run: python3 scripts/check_runtime_lock.py

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14.6"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates \
            curl \
            fontconfig \
            fonts-ipafont-gothic
          test -f /usr/share/fonts/opentype/ipafont-gothic/ipag.ttf
          fc-match IPAGothic

      - name: Install checksum-locked BtbN FFmpeg
        run: |
          sudo python scripts/install_locked_ffmpeg.py \
            --lock .devcontainer/runtime.lock.json \
            --prefix /opt/ffmpeg
          ffmpeg -version | head -n 1
          ffprobe -version | head -n 1

      - name: Install Python dependencies
        run: python -m pip install -e ".[dev]"

      - name: Restore generated media cache
        uses: actions/cache@v4
        with:
          path: |
            site-work/videos
            site-work/posters
            site-work/metadata
          key: >-
            pages-media-v1-${{ runner.os }}-${{ hashFiles(
            '.devcontainer/runtime.lock.json',
            'pyproject.toml',
            'site/demos/**',
            'site/render_demos.py',
            'site/site_lib.py',
            'zundamotion/**/*.py',
            'assets/**') }}
          restore-keys: |
            pages-media-v1-${{ runner.os }}-

      - name: Validate feature demo manifest
        run: python site/validate.py

      - name: Inspect restored media cache
        id: media-cache
        shell: bash
        run: |
          python site/render_demos.py \
            --output site-work \
            --cache-status >> "$GITHUB_OUTPUT"

      - name: Start pinned VOICEVOX CPU runtime
        if: steps.media-cache.outputs.voice_required == 'true'
        shell: bash
        run: |
          set -euo pipefail

          image=$(
            python - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(
              Path(".devcontainer/runtime.lock.json").read_text(encoding="utf-8")
          )
          print(
              data["voicevox"]["cpu_image"]
              + "@"
              + data["voicevox"]["cpu_digest"]
          )
          PY
          )

          docker run -d --name voicevox -p 50021:50021 "$image"

          ready=0
          for _ in $(seq 1 60); do
            if curl -fsS http://localhost:50021/version; then
              ready=1
              break
            fi
            sleep 2
          done

          if [ "$ready" -ne 1 ]; then
            echo "VOICEVOX did not become ready" >&2
            docker logs voicevox >&2 || true
            exit 1
          fi

      - name: Build generated feature demo site
        run: python site/build.py --render --output site-dist
        env:
          DISABLE_HWENC: "1"
          HW_FILTER_MODE: cpu
          USE_RAMDISK: "0"
          VOICEVOX_URL: http://localhost:50021

      - name: Check generated site links
        run: python site/link_check.py --site-dir site-dist

      - name: Stop VOICEVOX
        if: always() && steps.media-cache.outputs.voice_required == 'true'
        run: docker rm -f voicevox || true

      - name: Upload generated site
        uses: actions/upload-artifact@v6
        with:
          name: pages-site
          path: site-dist
          if-no-files-found: error
          include-hidden-files: true

      - name: Upload Pages diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: pages-diagnostics
          path: site-work
          if-no-files-found: warn

  publish-branch:
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      changed: ${{ steps.publish.outputs.changed }}

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download generated site
        uses: actions/download-artifact@v7
        with:
          name: pages-site
          path: ${{ runner.temp }}/pages-site

      - name: Replace generated gh-pages snapshot
        id: publish
        shell: bash
        run: |
          set -euo pipefail
          echo "changed=false" >> "$GITHUB_OUTPUT"
          test "${GITHUB_REF}" = "refs/heads/master"

          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch --depth=1 origin gh-pages
            git switch --force-create gh-pages origin/gh-pages
          else
            git switch --orphan gh-pages
          fi

          find . -mindepth 1 -maxdepth 1 \
            ! -name .git \
            -exec rm -rf {} +

          cp -a "${RUNNER_TEMP}/pages-site/." .
          touch .nojekyll

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No generated Pages changes"
            exit 0
          fi

          git commit -m "pages: ${GITHUB_SHA}"
          git push origin HEAD:gh-pages
          echo "changed=true" >> "$GITHUB_OUTPUT"

  deploy:
    if: >-
      github.ref == 'refs/heads/master' &&
      github.event_name == 'push' &&
      needs.publish-branch.outputs.changed == 'true'
    needs:
      - build
      - publish-branch
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: "${{ steps.deployment.outputs.page_url }}"

    steps:
      - name: Download generated site
        uses: actions/download-artifact@v7
        with:
          name: pages-site
          path: public

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public
          include-hidden-files: true

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
