name: Pages feature demos
on:
  push: {branches: [master]}
  workflow_dispatch:
concurrency: {group: pages-${{ github.ref }}, cancel-in-progress: true}
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions: {contents: read}
    steps:
      - uses: actions/checkout@v5
      - run: python3 scripts/check_runtime_lock.py
      - uses: actions/setup-python@v6
        with: {python-version: '3.14.6'}
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends fontconfig fonts-ipafont-gothic
      - run: sudo python scripts/install_locked_ffmpeg.py --lock .devcontainer/runtime.lock.json --prefix /opt/ffmpeg
      - run: python -m pip install -e '.[dev]'
      - run: python site/validate.py
      - name: Start pinned VOICEVOX CPU runtime
        run: |
          image=$(python -c "import json; d=json.load(open('.devcontainer/runtime.lock.json')); print(d['voicevox']['cpu_image'] + '@' + d['voicevox']['cpu_digest'])")
          docker run -d --name voicevox -p 50021:50021 "$image"
          for i in $(seq 1 60); do curl -fsS http://localhost:50021/version && break || sleep 2; done
      - run: python site/build.py --render --output site-dist
        env: {DISABLE_HWENC: '1', HW_FILTER_MODE: cpu, USE_RAMDISK: '0', VOICEVOX_URL: http://localhost:50021}
      - run: python site/link_check.py --site-dir site-dist
      - uses: actions/upload-artifact@v6
        with: {name: pages-site, path: site-dist, if-no-files-found: error}
      - uses: actions/upload-artifact@v6
        if: always()
        with: {name: pages-diagnostics, path: site-work, if-no-files-found: warn}
  publish-branch:
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions: {contents: write}
    steps:
      - uses: actions/checkout@v5
        with: {ref: gh-pages, path: gh-pages}
      - uses: actions/download-artifact@v7
        with: {name: pages-site, path: public}
      - name: Replace generated snapshot only
        run: |
          test "${GITHUB_REF}" = refs/heads/master
          git -C gh-pages rm -r --ignore-unmatch .
          cp -a public/. gh-pages/
          git -C gh-pages config user.name github-actions[bot]
          git -C gh-pages config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git -C gh-pages add -A
          git -C gh-pages commit -m "pages: ${GITHUB_SHA}" || exit 0
          git -C gh-pages push origin HEAD:gh-pages
  deploy:
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    needs: publish-branch
    runs-on: ubuntu-latest
    permissions: {contents: read, pages: write, id-token: write}
    environment: {name: github-pages, url: ${{ steps.deployment.outputs.page_url }}}
    steps:
      - uses: actions/download-artifact@v7
        with: {name: pages-site, path: public}
      - uses: actions/upload-pages-artifact@v4
        with: {path: public}
      - id: deployment
        uses: actions/deploy-pages@v4
