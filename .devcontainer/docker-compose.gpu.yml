services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile.gpu
    runtime: nvidia
    gpus: all
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility
  render:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile.gpu
    runtime: nvidia
    gpus: all
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility
