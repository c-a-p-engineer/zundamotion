services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
      args:
        RUNTIME_IMAGE: ${ZUNDAMOTION_RUNTIME_CPU_IMAGE:?run scripts/export_runtime_env.py first}
    working_dir: /workspace
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    depends_on:
      - voicevox
    environment:
      - VOICEVOX_URL=http://voicevox:50021
      - USE_RAMDISK=1
      - NVENC_FAST=1
    shm_size: "2gb"

  render:
    profiles: ["runner"]
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
      args:
        RUNTIME_IMAGE: ${ZUNDAMOTION_RUNTIME_CPU_IMAGE:?run scripts/export_runtime_env.py first}
    working_dir: /workspace
    volumes:
      - ..:/workspace:cached
    command:
      - /bin/bash
      - -lc
      - ${ZUNDAMOTION_COMMAND:-python -m zundamotion.main scripts/sample.yaml -o output/sample.mp4 --no-cache --hw-encoder cpu --log-kv}
    depends_on:
      - voicevox
    environment:
      - VOICEVOX_URL=http://voicevox:50021
      - USE_RAMDISK=1
      - NVENC_FAST=1
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    shm_size: "2gb"

  voicevox:
    image: ${VOICEVOX_IMAGE:-voicevox/voicevox_engine:cpu-ubuntu22.04-latest}
    ports:
      - "50021:50021"
    shm_size: "2gb"
