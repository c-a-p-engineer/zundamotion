meta:
  title: "静止画像 overlay effect スモーク"
  version: 1

video:
  fps: 30

defaults:
  characters:
    narrator:
      speaker_id: 3

scenes:
  - id: warning_static_shake
    bg: "assets/bg/room.png"
    fg_overlays:
      - id: warning_shake
        src: "assets/overlay/warning.png"
        mode: overlay
        opacity: 1.0
        position: {x: 420, y: 260}
        scale: {w: 1080, h: 360, keep_aspect: true}
        fps: 30
        effects:
          - type: shake
            amplitude_deg: 2.0
            frequency_hz: 3.0
        timing:
          start: 0.0
          duration: 3.0
    lines:
      - text: "警告画像だけが揺れる短い確認です。背景は揺れません。"
        speaker_name: "narrator"
      - wait: 1.0
