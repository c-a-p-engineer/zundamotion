meta:
  title: キャラクターごとのデフォルト設定サンプル
  version: 3
video:
  fps: 30
  face_anim:
    mouth_fps: 15
    mouth_thr_half: 0.2
    mouth_thr_open: 0.5
    blink_min_interval: 2.0
    blink_max_interval: 5.0
    blink_close_frames: 2
defaults:
  characters:
    copetan:
      speaker_id: 3
      speed: 1.1
      pitch: 0.05
      subtitle:
        font_color: '#90EE90'
        stroke_color: white
    engy:
      speaker_id: 8
      speed: 0.95
      subtitle:
        font_color: '#E6E6FA'
        stroke_color: black
subtitle:
  font_path: /usr/share/fonts/opentype/ipafont-gothic/ipag.ttf
  size: 48
  color: white
  outline: black
  wrap_mode: chars
  max_chars_per_line: 28
  reading_display: paren
scenes:
- id: subtitle_copetan
  bg: assets/bg/room.png
  fg_overlays:
  - id: sakura
    src: assets/overlay/sakura_bg_black.mp4
    mode: chroma
    chroma:
      key_color: '#000000'
      similarity: 0.1
      blend: 0.0
    position:
      x: 0
      y: 0
    scale:
      w: 1920
      h: 1080
      keep_aspect: true
    timing:
      start: 0.0
      duration: 5.0
      loop: true
  - id: speedlines_img_effects
    src: assets/overlay/speedlines.png
    mode: overlay
    opacity: 0.9
    position:
      x: 0
      y: 0
    scale:
      w: 1920
      h: 1080
      keep_aspect: true
    fps: 30
    effects:
    - type: blur
      sigma: 2.5
    - type: eq
      contrast: 1.02
      saturation: 1.0
    - type: rotate
      degrees: 0.0
    timing:
      start: 0.0
      duration: 5.0
  items:
  - say:
      text: こんにちは！こぴぺたんです。この字幕はキャラクターデフォルト色なのだ。
      speaker_name: copetan
      characters:
      - name: copetan
        expression: default
        enter: true
        enter_duration: 0.5
        anchor: bottom_center
        scale: 0.8
  - say:
      text: このセリフだけ、字幕の色を変えてみるのだ。
      speaker_name: copetan
      subtitle:
        font_color: yellow
  - say:
      text: 字幕の手動改行サンプルを紹介するのだ。
      speaker_name: copetan
      subtitle_text: 手動改行の例だよ\nPNGと字幕ファイルで2行になるのだ。
      reading: 手動改行の例だよ。PNGと字幕ファイルで二行になるのだ。
  - say:
      text: 私はエンジー。私の字幕もデフォルト設定よ。
      speaker_name: engy
      characters:
      - name: copetan
        leave: slide_right
        leave_duration: 0.5
      - name: engy
        expression: default
        enter: slide_left
        anchor: bottom_center
        position:
          x: 480
          y: -20
        scale: 0.8
  - say:
      text: このプロジェクト、なかなか面白いじゃない。
      speaker_name: engy
- id: voice_copetan
  bg: assets/bg/room.png
  items:
  - say:
      text: こんにちは！こぴぺたんです。これは桜の前景とデフォルト設定で話しているのだ。
      speaker_name: copetan
      characters:
      - name: copetan
        expression: default
        visible: true
        anchor: middle_left
      fg_overlays:
      - id: line_sakura
        src: assets/overlay/sakura_bg_black.mp4
        mode: chroma
        chroma:
          key_color: '#000000'
          similarity: 0.1
          blend: 0.0
        position:
          x: 0
          y: 0
        scale:
          w: 1920
          h: 1080
          keep_aspect: true
        timing:
          loop: true
      - id: line_speedlines
        src: assets/overlay/speedlines.png
        mode: overlay
        opacity: 0.85
        position:
          x: 0
          y: 0
        scale:
          w: 1920
          h: 1080
          keep_aspect: true
        fps: 30
        effects:
        - type: blur
          sigma: 2.0
        - type: eq
          contrast: 1.02
          saturation: 1.0
        timing:
          start: 0.0
          duration: 4.0
  - say:
      text: このセリフだけ、少しゆっくり話してみるのだ。
      speaker_name: copetan
      speed: 0.9
  - say:
      text: 私はエンジー。私もデフォルト設定よ。
      speaker_name: engy
      characters:
      - name: engy
        expression: default
        visible: true
        anchor: middle_right
        scale: 0.8
  - say:
      text: このプロジェクト、なかなか面白いじゃない。
      speaker_name: engy
      pitch: -0.1
- id: intro
  bg: assets/bg/sample_video.mp4
  transition:
    type: fade
    duration: 1.0
  items:
  - bgm:
      id: intro
      action: start
      fade: 2.0
  - wait: 2
  - say:
      text: 背景ビデオと効果音、待機のテストなのだ！
      speaker_id: 3
      speaker_name: copetan
      sound_effects:
      - path: assets/se/rap_fanfare.mp3
        start_time: 3.0
        volume: 0.5
  - wait: 2
  - say:
      text: ''
      sound_effects:
      - path: assets/se/rap_fanfare.mp3
        start_time: 0.0
        volume: 0.7
  - say:
      text: これから自己紹介の動画をはじめるのだ。
      speaker_id: 3
      speaker_name: copetan
      characters:
      - name: copetan
        expression: whisper
        position:
          x: '0'
          y: '0'
        scale: 0.8
        anchor: bottom_center
        visible: true
      speed: 1.1
  - say:
      text: 最後まで見てくれると嬉しいのだ！
      voice_style: whisper
      speaker_name: copetan
      characters:
      - name: copetan
        expression: default
        position:
          x: '0'
          y: '0'
        scale: 0.8
        anchor: bottom_right
        visible: true
      pitch: 0.3
  - bgm:
      id: intro
      action: stop
      fade: 1.5
- id: topic
  bg: assets/bg/street.png
  items:
  - bgm:
      id: street
      action: start
  - wait: 2
  - say:
      text: 私はエンジーよ
      speaker_id: 8
      speaker_name: engy
      characters:
      - name: engy
        expression: default
        position:
          x: '0'
          y: '0'
        scale: 0.8
        anchor: middle_center
        visible: true
  - say:
      text: 趣味は新しいツールを試すこと！
      speaker_id: 8
      speaker_name: engy
      characters:
      - name: engy
        expression: default
        position:
          x: '0'
          y: '0'
        scale: 0.8
        anchor: bottom_center
        visible: true
      speed: 0.95
  - say:
      text: このチャンネルでは、便利なスクリプトや動画制作のコツを紹介するのよ。
      speaker_id: 8
      speaker_name: engy
  - bgm:
      id: street
      action: stop
- id: reading_demo
  bg: assets/bg/room.png
  transition:
    type: dissolve
    duration: 0.8
  items:
  - say:
      speaker_name: copetan
      text: それ[本気|ホンキ]？[本気|マジ]？ 本気{マジ}でいく？
      characters:
      - name: copetan
        expression: default
        visible: true
        anchor: bottom_center
        position:
          x: '0'
          y: '0'
        scale: 0.8
  - say:
      speaker_name: copetan
      text: 本気です！
      reading: マジです！
      characters:
      - name: engy
        expression: default
        position:
          x: '0'
          y: '0'
        scale: 0.8
        anchor: bottom_center
        visible: true
- id: outro
  bg: assets/bg/sunset.png
  items:
  - bgm:
      id: sunset
      action: start
  - wait: 2
  - say:
      text: 今日は見てくれて、ありがとうなのだ！
      speaker_id: 3
      speaker_name: copetan
      characters:
      - name: copetan
        expression: default
        position:
          x: '300'
          y: '500'
        visible: true
  - say:
      text: （画像を右下に小さく表示するのだ）
      speaker_id: 3
      speaker_name: copetan
      image_layers:
      - show:
          id: room_thumb
          path: assets/bg/room.png
          scale: 0.3
          anchor: bottom_right
          position:
            x: '-20'
            y: '-20'
          transition:
            in:
              type: fade
              duration: 0.6
            out:
              type: fade
              duration: 0.4
  - say:
      text: （別の画像も表示するのだ！）
      speaker_id: 3
      speaker_name: copetan
      image_layers:
      - show:
          id: sunset_thumb
          path: assets/bg/sunset.png
          scale: 0.25
          anchor: bottom_left
          position:
            x: '20'
            y: '-20'
          transition:
            in:
              type: fade
              duration: 0.5
  - say:
      text: チャンネル登録と高評価、よろしくお願いします！
      speaker_id: 3
      speaker_name: copetan
      characters:
      - name: copetan
        expression: default
        position:
          x: '300'
          y: '500'
        visible: true
      speed: 1.05
      image_layers:
      - hide:
          id: room_thumb
          transition:
            out:
              type: fade
              duration: 0.4
      - hide:
          id: sunset_thumb
          transition:
            out:
              type: fade
              duration: 0.4
  - bgm:
      id: sunset
      action: stop
bgm_layers:
- id: intro
  file: assets/bgm/intro.wav
  gain: -20.0
  loop: true
- id: street
  file: assets/bgm/street.wav
  gain: -13.979400086720375
  loop: true
- id: sunset
  file: assets/bgm/sunset.wav
  gain: -10.457574905606752
  loop: true
