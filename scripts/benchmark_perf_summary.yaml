meta:
  title: performance summary smoke benchmark
  version: 1

video:
  width: 640
  height: 360
  fps: 30

system:
  timeline:
    enabled: false
  subtitle_file:
    enabled: false

defaults:
  speed: 1.05
  characters:
    narrator:
      speaker_id: 3

voice:
  estimate_chars_per_second: 16
  estimate_min_duration: 0.55

subtitle:
  font_path: /usr/share/fonts/opentype/ipafont-gothic/ipag.ttf
  font_size: 26
  max_chars_per_line: 18
  y: h-60-text_h/2

scenes:
  - id: perf_summary_smoke
    bg: assets/bg/room.png
    items:
      - say:
          text: "性能サマリーの短い確認です。"
          speaker_name: narrator
      - say:
          text: "字幕PNGと行クリップ数を記録します。"
          speaker_name: narrator
      - say:
          text: "FFmpegとキャッシュの回数も確認します。"
          speaker_name: narrator
