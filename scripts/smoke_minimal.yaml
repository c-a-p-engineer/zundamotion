meta:
  title: "Smoke minimal"
  version: 1

video:
  width: 320
  height: 180
  fps: 10

background:
  default: assets/bg/default.png

bgm:
  path: assets/bgm/intro.wav
  volume: 0.08

defaults:
  characters_persist: true
  background_persist: false
  characters:
    copetan:
      scale: 0.20
      anchor: bottom_center
      position: {x: -70, y: 0}

scenes:
  - id: smoke_character
    bg: assets/bg/default.png
    character_defaults:
      copetan:
        scale: 0.20
        position: {x: -70, y: 0}
    lines:
      - text: "small smoke"
        duration: 1.0
        characters:
          - name: copetan
            expression: default
            visible: true
        sound_effects:
          - path: assets/se/rap_fanfare.mp3
            start_time: 0.0
            volume: 0.05
      - text: "expression keeps scale"
        duration: 1.0
        characters:
          - name: copetan
            expression: smile
            position: {x: 40, y: 0}
            move:
              duration: 0.5
              easing: ease_out
      - text: "voice layers use PCM"
        duration: 0.8
        voice_layers:
          - speaker_name: copetan
            text: "layer one"
          - speaker_name: copetan
            text: "layer two"
            start_time: 0.1
            volume: 0.5
      - wait: 0.4
  - id: smoke_transition
    bg: assets/bg/room.png
    transition:
      type: dissolve
      duration: 0.2
    lines:
      - text: "final smoke"
        duration: 1.0
        characters:
          - name: copetan
            expression: default
