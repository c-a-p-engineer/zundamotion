meta:
  title: "静止画像 overlay blink スモーク"
  version: 1

video:
  fps: 30

defaults:
  characters:
    narrator:
      speaker_id: 3

scenes:
  - id: blink_only
    bg: "assets/bg/room.png"
    fg_overlays:
      - id: warning_blink
        src: "assets/overlay/warning.png"
        mode: overlay
        position: {x: 420, y: 250}
        scale: {w: 1080, h: 360, keep_aspect: true}
        blink:
          interval: 0.2
          duty: 0.5
          min_opacity: 0.0
          max_opacity: 1.0
        timing:
          start: 0.0
          duration: 2.0
    lines:
      - text: "警告画像を完全に点滅させます。"
        speaker_name: "narrator"
      - wait: 0.5

  - id: blink_opacity
    bg: "assets/bg/room.png"
    fg_overlays:
      - id: warning_blink_opacity
        src: "assets/overlay/warning.png"
        mode: overlay
        opacity: 0.8
        position: {x: 420, y: 250}
        scale: {w: 1080, h: 360, keep_aspect: true}
        blink:
          interval: 0.25
          duty: 0.5
          min_opacity: 0.3
          max_opacity: 1.0
        timing:
          start: 0.0
          duration: 2.0
    lines:
      - text: "今度は薄く残る点滅です。"
        speaker_name: "narrator"
      - wait: 0.5

  - id: blink_fast
    bg: "assets/bg/room.png"
    fg_overlays:
      - id: warning_blink_fast
        src: "assets/overlay/warning.png"
        mode: overlay
        position: {x: 420, y: 250}
        scale: {w: 1080, h: 360, keep_aspect: true}
        blink:
          interval: 0.1
          duty: 0.5
          min_opacity: 0.0
          max_opacity: 1.0
        timing:
          start: 0.0
          duration: 2.0
    lines:
      - text: "これは速い点滅です。"
        speaker_name: "narrator"
      - wait: 0.5

  - id: blink_slow
    bg: "assets/bg/room.png"
    fg_overlays:
      - id: warning_blink_slow
        src: "assets/overlay/warning.png"
        mode: overlay
        position: {x: 420, y: 250}
        scale: {w: 1080, h: 360, keep_aspect: true}
        blink:
          interval: 0.8
          duty: 0.5
          min_opacity: 0.0
          max_opacity: 1.0
        timing:
          start: 0.0
          duration: 3.0
    lines:
      - text: "これはゆっくりした点滅です。"
        speaker_name: "narrator"
      - wait: 0.5

  - id: blink_shake
    bg: "assets/bg/room.png"
    fg_overlays:
      - id: warning_blink_shake
        src: "assets/overlay/warning.png"
        mode: overlay
        opacity: 1.0
        position: {x: 420, y: 250}
        scale: {w: 1080, h: 360, keep_aspect: true}
        fps: 30
        blink:
          interval: 0.2
          duty: 0.5
          min_opacity: 0.0
          max_opacity: 1.0
        effects:
          - type: shake
            amplitude_deg: 2.0
            frequency_hz: 3.0
        timing:
          start: 0.0
          duration: 2.0
    lines:
      - text: "最後は点滅と揺れの併用です。"
        speaker_name: "narrator"
      - wait: 0.5
